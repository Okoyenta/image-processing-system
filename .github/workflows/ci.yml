name: CI

on:
  push:
    branches: [ master, develop]
  pull_request:
    branches: [ master ]

jobs:
  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Package (skip tests)
        run: mvn -B package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push gateway
        uses: docker/build-push-action@v5
        with:
          context: ./gateway
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push upload-service
        uses: docker/build-push-action@v5
        with:
          context: ./upload-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/upload-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push processing-service
        uses: docker/build-push-action@v5
        with:
          context: ./processing-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/processing-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          source: "docker-compose.prod.yml,database/,monitoring/"
          target: "/opt/image-processing-system"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            cd /opt/image-processing-system

            # Write .env file from secrets
            cat > .env <<EOF
            DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            RABBITMQ_USER=${{ secrets.RABBITMQ_USER }}
            RABBITMQ_PASSWORD=${{ secrets.RABBITMQ_PASSWORD }}
            GRAFANA_ADMIN_USER=${{ secrets.GRAFANA_ADMIN_USER }}
            GRAFANA_ADMIN_PASSWORD=${{ secrets.GRAFANA_ADMIN_PASSWORD }}
            EOF

            # Pull latest images
            docker compose -f docker-compose.prod.yml pull

            # Start infra if not already running (postgres, kafka, rabbitmq)
            # docker compose -f docker-compose.prod.yml up -d postgres rabbitmq kafka
            docker compose -f docker-compose.prod.yml up -d --build loki promtail

            # Wait for infra to be healthy before starting app services
            sleep 20

            # Apply database schema (idempotent - safe to run on every deploy)
            docker compose -f docker-compose.prod.yml exec -T postgres \
              psql -U ${POSTGRES_USER:-postgres} -d image \
              -c "$(grep -v 'CREATE DATABASE' /opt/image-processing-system/database/image.sql)"

            # Restart app services with latest images
            docker compose -f docker-compose.prod.yml up -d --no-deps gateway upload-service processing-service

            # Start/update monitoring stack
            docker compose -f docker-compose.prod.yml up -d --no-deps prometheus grafana loki promtail

            # Clean up old images
            docker image prune -f