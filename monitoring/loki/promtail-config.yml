server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock

    relabel_configs:
      # container name
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'

      # map container → service label
      - source_labels: ['__meta_docker_container_name']
        regex: '.*gateway.*'
        target_label: 'service'
        replacement: 'gateway'

      - source_labels: ['__meta_docker_container_name']
        regex: '.*upload-service.*'
        target_label: 'service'
        replacement: 'upload-service'

      - source_labels: ['__meta_docker_container_name']
        regex: '.*processing-service.*'
        target_label: 'service'
        replacement: 'processing-service'

      # optional: add log stream
      - source_labels: ['__meta_docker_container_name']
        target_label: 'job'
        replacement: 'docker'